<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JS-函数</title>
</head>
<body>
  

  <script>
    //1. 函数定义及调用 - 具名函数（有函数名）
    function add1(a,b){
       return a + b;
    }

    let result = add1(10,20);//如果传递多个参数，超出部分会被忽略
    console.log(result);
    

    //2. 函数定义及调用 - 匿名函数
    //2.1 函数表达式
    let add2=function(a,b){
      return a+b;
    }
    let result2 = add2(100,200);
    console.log(result2);

    //2.2 箭头函数
    let add = (a,b) => {
      return a + b;
    }

    let result3 = add(1000,2000);
    console.log(result3);


  </script>
</body>
</html>

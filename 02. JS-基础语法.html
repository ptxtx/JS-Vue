<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JS-基础语法</title>
</head>
<body>
  

  <script>
    //1.声明变量
    let a=10;
    a="hello";
    alert(a);//弹出框

    //2.声明常量
    const PI=3.14;
    console.log(PI);//输出到控制台

    document.write(PI);//输出到页面
  </script>
</body>
</html>
